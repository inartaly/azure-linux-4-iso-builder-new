# Azure Linux 4 ISO Builder — Default Configuration
# Source this file or pass via --config to build-azl4-iso.sh

# ─── Repository ──────────────────────────────────────────────────────────────
REPO_NAME="azurelinux-4.0-prod"
REPO_BASEURL="https://packages.microsoft.com/azurelinux/4.0/prod/base/\$basearch/"
REPO_GPGKEY="https://packages.microsoft.com/keys/microsoft.asc"
REPO_GPGCHECK=1

# ─── ISO Metadata ───────────────────────────────────────────────────────────
ISO_VOLUME_LABEL="AZL4"
ISO_PUBLISHER="Azure Linux 4 ISO Builder"
ISO_APPLICATION="Azure Linux 4.0 Live"

# ─── System Defaults ────────────────────────────────────────────────────────
DEFAULT_HOSTNAME="azurelinux"
DEFAULT_LOCALE="en_US.UTF-8"
DEFAULT_TIMEZONE="UTC"
DEFAULT_KEYMAP="us"

# Root password: "azurelinux" (change for production!)
# Generated with: python3 -c "import crypt; print(crypt.crypt('azurelinux', crypt.mksalt(crypt.METHOD_SHA512)))"
DEFAULT_ROOT_PASSWORD='$6$rounds=4096$azl4builder$placeholder'

# Set to "yes" to allow root login without password on the console (live ISO convenience)
ALLOW_ROOT_AUTOLOGIN="yes"

# ─── Packages ────────────────────────────────────────────────────────────────
# Which package list to use: "core" or "full"
PACKAGE_PROFILE="core"

# Additional packages (space-separated) appended to the chosen profile
EXTRA_PACKAGES=""

# ─── Build Options ───────────────────────────────────────────────────────────
# SquashFS compression algorithm: xz, gzip, lzo, lz4, zstd
SQUASHFS_COMPRESSION="xz"

# EFI boot image size in MiB (must fit shim + grub + grub.cfg)
EFI_IMG_SIZE_MB=16

# Dracut modules to include for live boot
DRACUT_MODULES="dmsquash-live"

# ─── Output ──────────────────────────────────────────────────────────────────
OUTPUT_DIR="./output"
BUILD_DIR="./build"
